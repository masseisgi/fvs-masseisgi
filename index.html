<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASSEI — FVS Gestão Integrada</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--surf:#0d1119;--surf2:#111827;--bord:#1a2540;
  --acc:#00c896;--acc2:#0099ff;--nok:#e05c3a;--ok:#27ae60;--na:#4a5568;
  --text:#e8eaf2;--muted:#6b7a99;--r:8px;
  --grad:linear-gradient(135deg,#00c896,#0099ff);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#00c896,#0099ff,#00c896);background-size:200%;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}

/* TOPBAR */
.topbar{background:var(--surf);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,#00c896,#0099ff) 1;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:200}
.brand{display:flex;align-items:center;gap:10px}
.logo-pill{background:var(#00c896);color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:.66rem;letter-spacing:.1em;padding:3px 8px;border-radius:3px}
.brand h1{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:700;color:#fff}
.acts{display:flex;gap:8px;align-items:center}
#ss{font-size:.68rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.sd{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s}
#ss.saved .sd{background:var(--ok)}
#ss.saving .sd{background:var(#00c896);animation:bl .8s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:6px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.74rem;cursor:pointer;border:none;transition:all .2s}
.bg{background:transparent;border:1px solid var(--bord);color:var(--muted)}.bg:hover{border-color:var(#00c896);color:var(#00c896)}
.bp{background:var(#00c896);color:#000}.bp:hover{background:#00a87e}

/* SIDEBAR + MAIN */
.layout{display:flex;height:calc(100vh - 54px)}
.sidebar{width:260px;min-width:260px;background:var(--surf);border-right:1px solid var(--bord);overflow-y:auto;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:24px 24px 80px}

/* SIDEBAR */
.sb-head{padding:14px 16px 10px;font-family:'Syne',sans-serif;font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.sb-item{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-item:hover{background:rgba(255,255,255,.03);border-left-color:var(--bord)}
.sb-item.active{background:rgba(240,165,0,.08);border-left-color:var(#00c896)}
.sb-name{font-size:.80rem;font-weight:600;color:var(--text);line-height:1.3}
.sb-item.active .sb-name{color:var(#00c896)}
.sb-nc{font-size:.62rem;background:var(--nok);color:#fff;padding:1px 6px;border-radius:10px;white-space:nowrap;display:none}
.sb-ok{font-size:.62rem;background:var(--ok);color:#fff;padding:1px 6px;border-radius:10px;white-space:nowrap;display:none}

/* FICHA HEADER */
.fh{margin-bottom:20px}
.fh-tag{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fh-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#00c896,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.fh-desc{font-size:.86rem;color:var(--muted);line-height:1.6;margin-bottom:10px}
.normas{display:flex;flex-wrap:wrap;gap:6px}
.norma-badge{font-size:.68rem;font-weight:700;background:rgba(240,165,0,.12);color:var(#00c896);padding:2px 9px;border-radius:10px;border:1px solid rgba(240,165,0,.3)}

/* COUNTERS */
.counters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.chip{background:var(--surf);border:1px solid var(--bord);border-radius:6px;padding:8px 14px;text-align:center;min-width:78px}
.chip .v{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800}
.chip .l{font-size:.62rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.chip.ok .v{color:var(--ok)}.chip.nok .v{color:var(--nok)}.chip.na .v{color:var(--na)}.chip.tot .v{color:var(#00c896)}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bord)}
table.ck{width:100%;border-collapse:collapse}
table.ck thead tr{background:var(--surf2)}
table.ck thead th{padding:9px 12px;font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--bord)}
table.ck thead th.c{text-align:center}
table.ck tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
table.ck tbody tr:hover{background:rgba(255,255,255,.02)}
table.ck tbody tr.nc-row{background:rgba(224,92,58,.07)}
table.ck td{padding:9px 12px;vertical-align:top;font-size:.82rem}
table.ck td.c{vertical-align:middle;text-align:center}
table.ck td .num{font-size:.64rem;color:var(--muted);margin-right:4px}
table.ck td .it{font-weight:600;color:var(--text);display:block;margin-bottom:3px}
table.ck td .cm{font-size:.78rem;color:var(--muted);display:block;margin-bottom:2px}
table.ck td .tol{font-size:.74rem;color:#00c896;display:block}
table.ck td .frq{font-size:.70rem;color:var(#00c896);margin-top:3px;display:block}
.col-item{width:46%}.col-res{width:18%}.col-obs{width:36%}

/* RADIO */
.rp{display:flex;gap:4px;justify-content:center}
.rp input[type=radio]{display:none}
.rp label{cursor:pointer;padding:3px 8px;border-radius:20px;font-size:.66rem;font-weight:700;border:1.5px solid var(--bord);color:var(--muted);transition:all .15s;user-select:none}
.rp input[type=radio]:checked+label.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.rp input[type=radio]:checked+label.nok{background:var(--nok);color:#fff;border-color:var(--nok)}
.rp input[type=radio]:checked+label.na{background:var(--na);color:#fff;border-color:var(--na)}
.obs-i{background:transparent!important;border:none!important;border-bottom:1px dashed var(--bord)!important;border-radius:0!important;padding:2px 4px!important;font-size:.78rem!important;width:100%;color:var(--text)!important;font-family:'Nunito',sans-serif}
.obs-i:focus{border-bottom-color:var(#00c896)!important;outline:none}

/* IDENTIFICAÇÃO */
.card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.ch{padding:10px 16px;background:var(--surf2);border-bottom:1px solid var(--bord);font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(#00c896)}
.cb{padding:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.s2{grid-column:span 2}.s3{grid-column:span 3}
.f label{display:block;font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.f input,.f select,.f textarea{width:100%;background:var(--bg);border:1px solid var(--bord);border-radius:5px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:.84rem;color:var(--text);outline:none;transition:border-color .2s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(#00c896)}
.f select option{background:var(--surf2)}
.f textarea{resize:vertical;min-height:60px}

/* PLANO DE AÇÃO */
.pa-card{background:var(--surf);border:1px solid var(--bord);border-left:3px solid var(--nok);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.pa-h{background:rgba(224,92,58,.1);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pa-t{font-weight:700;font-size:.84rem;display:flex;align-items:center;gap:7px}
.pa-n{font-size:.64rem;color:var(--nok);font-weight:700;letter-spacing:.05em;background:rgba(224,92,58,.15);padding:2px 7px;border-radius:10px}
.pa-b{padding:12px 14px}
.pa-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pa-f label{font-size:.64rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px}
.pa-f input,.pa-f select,.pa-f textarea{width:100%;background:var(--bg);border:1px solid var(--bord);border-radius:5px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:.82rem;color:var(--text);outline:none}
.pa-f input:focus,.pa-f select:focus,.pa-f textarea:focus{border-color:var(--nok)}
.pa-f select option{background:var(--surf2)}
.pa-f textarea{min-height:52px;resize:vertical}
.pa-f.full{grid-column:span 2}
.ai-ld{display:flex;align-items:center;gap:9px;padding:12px 14px;color:var(--muted);font-size:.82rem;background:rgba(240,165,0,.05);border-top:1px solid var(--bord)}
.ai-d span{display:inline-block;width:5px;height:5px;background:var(#00c896);border-radius:50%;animation:dot 1.2s infinite;margin:0 2px}
.ai-d span:nth-child(2){animation-delay:.2s}.ai-d span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-b{display:inline-flex;align-items:center;gap:4px;font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(#00c896);background:rgba(240,165,0,.1);padding:2px 7px;border-radius:10px}

/* STATUS */
.st-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r);padding:12px 16px}
.st-lbl{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.st-pills{display:flex;gap:6px;flex-wrap:wrap}
.st-pills label{cursor:pointer;display:flex;align-items:center;gap:5px;font-size:.80rem;font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid var(--bord);color:var(--muted);transition:all .2s}
.st-pills input[type=radio]{display:none}
.st-pills input[type=radio]:checked+label{border-color:var(#00c896);color:var(#00c896);background:rgba(240,165,0,.1)}

/* ASSINATURAS */
.sig-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.sig-w{background:var(--bg);border:1px solid var(--bord);border-radius:5px;height:72px;position:relative;cursor:crosshair;overflow:hidden;margin-bottom:6px}
canvas.sc{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none}
.sig-lbl{font-size:.64rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(#00c896);display:block;margin-bottom:4px;margin-top:6px}
.sig-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.clr{font-size:.62rem;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;padding:1px 0;transition:color .2s}
.clr:hover{color:var(--nok)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .big{font-size:2rem;margin-bottom:8px}

/* TABS (subtabs dentro de ficha) */
.stabs{display:flex;gap:2px;border-bottom:1px solid var(--bord);margin-bottom:18px}
.stab{padding:9px 14px;font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.stab:hover{color:var(--text)}
.stab.active{color:var(#00c896);border-bottom-color:var(#00c896)}
.stab .b{background:var(--nok);color:#fff;font-size:.58rem;padding:1px 5px;border-radius:8px;margin-left:4px;display:none}

.spanel{display:none}.spanel.active{display:block}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surf2);border:1px solid var(--bord);border-left:3px solid var(--ok);border-radius:var(--r);padding:10px 16px;font-size:.80rem;font-weight:600;color:var(--text);z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast.err{border-left-color:var(--nok)}

/* PRINT */
@media print{
  .sidebar,.topbar .acts,.clr{display:none}
  .layout{display:block;height:auto}
  .main{padding:0}
  .topbar{position:relative}
  .tw{border:1px solid #ccc!important}
  table.ck thead tr{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rp input[type=radio]:checked+label.ok{background:#27ae60!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rp input[type=radio]:checked+label.nok{background:#e05c3a!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rp input[type=radio]:checked+label.na{background:#5a6680!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .spanel{display:block!important}
  .stabs{display:none}
  body,*{color:#000!important;background:#fff!important}
  .norma-badge{border:1px solid #ccc!important;color:#555!important;background:#f5f5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>

let currentFicha = 1;
let currentSubtab = 'ck'; // 'id', 'ck', 'pa', 'ap'

// ══════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════
function buildSidebar() {
  const sb = document.getElementById('sbList');
  FICHAS.forEach(f => {
    const el = document.createElement('div');
    el.className = 'sb-item' + (f.id === 1 ? ' active' : '');
    el.id = 'sb_' + f.id;
    el.onclick = () => selectFicha(f.id);
    el.innerHTML = `<span class="sb-name">${f.nome}</span><span class="sb-nc" id="sbnc_${f.id}"></span><span class="sb-ok" id="sbok_${f.id}"></span>`;
    sb.appendChild(el);
  });
}

function selectFicha(id) {
  currentFicha = id;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.getElementById('sb_' + id).classList.add('active');
  renderFicha(id);
}

// ══════════════════════════════════════════════════════
// RENDER FICHA
// ══════════════════════════════════════════════════════
function renderFicha(id) {
  const f = FICHAS.find(x => x.id === id);
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'fh';
  hdr.innerHTML = `
    <div class="fh-tag">FVS ${String(id).padStart(2,'0')} / 15</div>
    <div class="fh-title">${f.nome}</div>
    <div class="fh-desc">${f.descricao}</div>
    <div class="normas">${f.normas.map(n=>`<span class="norma-badge">${n}</span>`).join('')}</div>
  `;
  main.appendChild(hdr);

  // Subtabs
  const tabs = document.createElement('div');
  tabs.className = 'stabs';
  tabs.innerHTML = `
    <div class="stab ${currentSubtab==='id'?'active':''}" onclick="goSubtab('id')">📋 Identificação</div>
    <div class="stab ${currentSubtab==='ck'?'active':''}" onclick="goSubtab('ck')">✅ Checklist</div>
    <div class="stab ${currentSubtab==='pa'?'active':''}" onclick="goSubtab('pa')">⚠️ Plano de Ação<span class="b" id="nctab_${id}"></span></div>
    <div class="stab ${currentSubtab==='ap'?'active':''}" onclick="goSubtab('ap')">✍️ Aprovação</div>
  `;
  main.appendChild(tabs);

  // Panels
  main.appendChild(buildIdPanel(id, f));
  main.appendChild(buildCkPanel(id, f));
  main.appendChild(buildPaPanel(id));
  main.appendChild(buildApPanel(id));

  updateCounters(id);
  updatePAPanel(id);
  initSigs(id);
}

function goSubtab(name) {
  currentSubtab = name;
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.spanel').forEach(p => p.classList.remove('active'));
  const tabs = document.querySelectorAll('.stab');
  const panels = document.querySelectorAll('.spanel');
  const names = ['id','ck','pa','ap'];
  const idx = names.indexOf(name);
  if (tabs[idx]) tabs[idx].classList.add('active');
  if (panels[idx]) panels[idx].classList.add('active');
}

function onResult(fichaId, idx, val) {
  const f = FICHAS.find(x => x.id === fichaId);
  const row = document.getElementById(`row_${fichaId}_${idx}`);
  if (!row) return;
  if (val === 'NC') {
    row.classList.add('nc-row');
    if (!ncState[fichaId]) ncState[fichaId] = {};
    if (!ncState[fichaId][idx]) {
      ncState[fichaId][idx] = { idx, text: f.itens[idx].item, fields: {}, loading: true };
      updatePAPanel(fichaId);
      generateAI(fichaId, idx, f.nome, f.itens[idx]);
    }
  } else {
    row.classList.remove('nc-row');
    if (ncState[fichaId]?.[idx]) {
      delete ncState[fichaId][idx];
      updatePAPanel(fichaId);
    }
  }
  updateCounters(fichaId);
  updateSidebarBadge(fichaId);
  autoSave();
}

async function generateAI(fichaId, idx, nomeServico, itemObj) {
  const resp = document.getElementById(`fid_resp_${fichaId}`)?.value || '';
  const obra = document.getElementById(`fid_obra_${fichaId}`)?.value || '';
  const prompt = `Você é especialista em qualidade de obras de infraestrutura e saneamento no Brasil.

Foi identificada uma Não Conformidade (NC) em uma FVS.

Contexto:
- Serviço: "${nomeServico}"
- Obra: "${obra||'não informada'}"
- Responsável: "${resp||'não informado'}"
- Item com NC: "${itemObj.item}"
- Tolerância: "${itemObj.tolerancia}"
- Como verificar: "${itemObj.como}"

Gere um plano de ação detalhado. Responda SOMENTE com JSON válido, sem markdown:
{
  "desc": "descrição técnica objetiva da NC específica para este item (2-3 frases)",
  "causa": "causa raiz mais provável para esta NC específica (1-2 frases)",
  "acao": "ação corretiva técnica e específica para corrigir esta NC (2-3 frases)",
  "resp": "cargo/função mais adequado para corrigir esta NC",
  "prazo_dias": número inteiro de dias recomendados,
  "prio": "Alta" ou "Média" ou "Baixa",
  "norma": "norma ABNT/NBR/NR mais relevante para este item, ou vazio"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const raw = data.content?.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    const prazoDate = new Date();
    prazoDate.setDate(prazoDate.getDate() + (parsed.prazo_dias||7));
    if (ncState[fichaId]?.[idx]) {
      ncState[fichaId][idx].loading = false;
      ncState[fichaId][idx].fields = {
        desc: parsed.desc||'', causa: parsed.causa||'', acao: parsed.acao||'',
        resp: parsed.resp||'', prazo: prazoDate.toISOString().split('T')[0],
        prio: parsed.prio||'Média', status:'Aberta', norma: parsed.norma||''
      };
      if (currentFicha === fichaId && currentSubtab === 'pa') updatePAPanel(fichaId);
      else updatePAPanel(fichaId);
      autoSave();
    }
  } catch(e) {
    if (ncState[fichaId]?.[idx]) {
      ncState[fichaId][idx].loading = false;
      ncState[fichaId][idx].fields = {status:'Aberta'};
      updatePAPanel(fichaId);
    }
  }
}

function updateCounters(id) {
  const f = FICHAS.find(x => x.id === id);
  let c=0,nc=0,na=0;
  f.itens.forEach((it,idx) => {
    const el = document.querySelector(`input[name="fi${id}_${idx}"]:checked`);
    if(!el) return;
    if(el.value==='C') c++;
    else if(el.value==='NC') nc++;
    else if(el.value==='NA') na++;
  });
  const set = (sel, v) => { const el=document.getElementById(sel); if(el) el.textContent=v; };
  set(`cnt_c_${id}`, c); set(`cnt_nc_${id}`, nc); set(`cnt_na_${id}`, na);
}

function updateSidebarBadge(id) {
  const ncs = ncState[id] ? Object.keys(ncState[id]).length : 0;
  const f = FICHAS.find(x => x.id === id);
  let c=0,tot=0;
  f.itens.forEach((it,idx) => {
    const el = document.querySelector(`input[name="fi${id}_${idx}"]:checked`);
    if(!el) return; tot++;
    if(el.value==='C') c++;

  const ncEl = document.getElementById('sbnc_'+id);

}

const sigCtx = {};
function initSigs(id) {
  [0,1,2].forEach(i => {
    const cv = document.getElementById(`sc_${id}_${i}`);
    if(!cv) return;
    const ctx = cv.getContext('2d');
    let drawing=false, last=null;
    function resize(){
      const r=cv.parentElement.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
      cv.width=r.width*dpr; cv.height=r.height*dpr; ctx.scale(dpr,dpr);
      ctx.strokeStyle='#e8eaf2'; ctx.lineWidth=1.8; ctx.lineCap='round';
    }
    resize();
    if(!sigCtx[id]) sigCtx[id]={};
    sigCtx[id][i]={canvas:cv, ctx, clear:()=>ctx.clearRect(0,0,cv.width,cv.height)};
    function gp(e){const r=cv.getBoundingClientRect();return e.touches?{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}:{x:e.clientX-r.left,y:e.clientY-r.top};}
    cv.addEventListener('mousedown',e=>{drawing=true;last=gp(e);});
    cv.addEventListener('mousemove',e=>{if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;});
    cv.addEventListener('mouseup',()=>{drawing=false;autoSave();});
    cv.addEventListener('mouseleave',()=>drawing=false);
    cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;last=gp(e);},{passive:false});
    cv.addEventListener('touchmove',e=>{if(!drawing)return;e.preventDefault();const p=gp(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;},{passive:false});
    cv.addEventListener('touchend',()=>{drawing=false;autoSave();});
  });
}
function clearSig(id,i){if(sigCtx[id]?.[i]) sigCtx[id][i].clear(); autoSave();}

// SAVE / LOAD (IndexedDB)
// ══════════════════════════════════════════════════════
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('fvs_infra_v1',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('data',{keyPath:'id'});
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=()=>rej();
  });
}

function collectAll() {
  const out = { fichas: {}, ncState: {} };
  FICHAS.forEach(f => {
    const id = f.id;
    const fd = {};
    ['obra','cont','resp','fisc','data','hi','ht','num','loc','rev','obs'].forEach(k=>{
      const el=document.getElementById(`fid_${k}_${id}`); if(el) fd[k]=el.value||'';
    });
    const ck = {};
    f.itens.forEach((it,idx)=>{
      const el=document.querySelector(`input[name="fi${id}_${idx}"]:checked`);
      const obsEl=document.getElementById(`obs_${id}_${idx}`);
      ck[idx]={result:el?el.value:'', obs:obsEl?obsEl.value:''};
    });
    fd.ck = ck;
    const stEl=document.querySelector(`input[name="st_${id}"]:checked`);
    fd.status=stEl?stEl.value:'';
    fd.sigs=[0,1,2].map(i=>{const cv=sigCtx[id]?.[i]?.canvas; return cv?cv.toDataURL():'';});
    [0,1,2].forEach(i=>{
      ['sn','sr','sd'].forEach(k=>{const el=document.getElementById(`${k}_${id}_${i}`);fd[`${k}${i}`]=el?el.value:'';});
    });
    out.fichas[id]=fd;
  });
  // nc state (sem loading)
  Object.entries(ncState).forEach(([fid,ncs])=>{
    out.ncState[fid]={};
    Object.entries(ncs).forEach(([idx,nc])=>{
      out.ncState[fid][idx]={idx:nc.idx, text:nc.text, fields:nc.fields||{}};
    });
  });
  return out;
}

async function saveFVS(){
  setSS('saving');
  const data=collectAll();
  await openDB();
  const tx=db.transaction('data','readwrite');
  tx.objectStore('data').put({id:'all',data,ts:Date.now()});
  tx.oncomplete=()=>{setSS('saved');showToast('💾 Todas as fichas salvas!');};
  tx.onerror=()=>{setSS('');showToast('❌ Erro ao salvar',true);};
}

async function loadSaved(){
  await openDB();
  const tx=db.transaction('data','readonly');
  const r=tx.objectStore('data').get('all');
  r.onsuccess=e=>{
    if(!e.target.result){showToast('Nenhum dado salvo.',true);return;}
    applyAll(e.target.result.data);
    showToast('📂 Fichas carregadas!');
  };
}

function applyAll(saved) {
  // restore nc state
  if(saved.ncState){
    Object.entries(saved.ncState).forEach(([fid,ncs])=>{
      const id=parseInt(fid);
      if(!ncState[id]) ncState[id]={};
      Object.entries(ncs).forEach(([idx,nc])=>{
        ncState[id][parseInt(idx)]={idx:nc.idx, text:nc.text, fields:nc.fields||{}, loading:false};
      });
    });
  }
  // restore form data for all fichas
  FICHAS.forEach(f=>{
    const id=f.id;
    const fd=saved.fichas?.[id];
    if(!fd) return;
    ['obra','cont','resp','fisc','data','hi','ht','num','loc','rev','obs'].forEach(k=>{
      const el=document.getElementById(`fid_${k}_${id}`);if(el&&fd[k]!==undefined) el.value=fd[k];
    });
    if(fd.ck) Object.entries(fd.ck).forEach(([idx,val])=>{
      if(val.result){const el=document.getElementById(`fi${id}_${idx}_${val.result.toLowerCase()}`);if(el) el.checked=true;}
      const obsEl=document.getElementById(`obs_${id}_${idx}`);if(obsEl) obsEl.value=val.obs||'';
    });
    if(fd.status){const el=document.querySelector(`input[name="st_${id}"][value="${fd.status}"]`);if(el) el.checked=true;}
    [0,1,2].forEach(i=>{
      ['sn','sr','sd'].forEach(k=>{const el=document.getElementById(`${k}_${id}_${i}`);if(el) el.value=fd[`${k}${i}`]||'';});
    });
    updateCounters(id);
    updateSidebarBadge(id);
  });
  // restore sigs for current ficha
  if(saved.fichas?.[currentFicha]?.sigs){
    saved.fichas[currentFicha].sigs.forEach((src,i)=>{
      if(!src||!sigCtx[currentFicha]?.[i]) return;
      const img=new Image();
      img.onload=()=>{const cv=sigCtx[currentFicha][i];cv.ctx.clearRect(0,0,cv.canvas.width,cv.canvas.height);cv.ctx.drawImage(img,0,0,cv.canvas.offsetWidth,cv.canvas.offsetHeight);};
      img.src=src;
    });
  }
  updatePAPanel(currentFicha);
  setSS('saved');
}

let asTmr;
function autoSave(){
  clearTimeout(asTmr);setSS('saving');
  asTmr=setTimeout(saveFVS,1800);
}

function setSS(s){
  const el=document.getElementById('ss'),tx=document.getElementById('stx');
  el.className=s;tx.textContent=s==='saved'?'Salvo':s==='saving'?'Salvando…':'Não salvo';
}

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(err?' err':'');
  setTimeout(()=>t.className='toast',3200);
}
