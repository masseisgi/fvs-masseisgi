<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#00c896">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>MASSEI — FVS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--surf:#0d1119;--surf2:#111827;--card:#141b28;--bord:#1e2d45;
  --ok:#00c896;--nok:#e05c3a;--na:#3a4a5c;--blue:#0099ff;
  --text:#e8eaf2;--muted:#6b7a99;--r:14px;
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:15px}
.topbar{background:var(--surf);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bord);flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#00c896,#0099ff,#00c896);background-size:200%;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{width:38px;height:38px;border-radius:50%;object-fit:contain;flex-shrink:0}
.tb-brand{font-size:.60rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(135deg,#00c896,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tb-title{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;color:var(--text);line-height:1.2}
.tb-prog-lbl{font-size:.60rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:right}
.tb-prog-val{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;text-align:right;background:linear-gradient(135deg,#00c896,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btabs{display:flex;background:var(--surf);border-top:1px solid var(--bord);flex-shrink:0}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;gap:3px;transition:color .2s;position:relative}
.btab .ico{font-size:1.3rem;line-height:1}
.btab.active{color:var(--ok)}
.btab.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,#00c896,#0099ff);border-radius:0 0 2px 2px}
.btab .nb{position:absolute;top:4px;right:calc(50% - 18px);background:var(--nok);color:#fff;font-size:.55rem;font-weight:800;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;display:none}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-behavior:smooth}
.panel{display:none;padding:14px 14px 100px;min-height:100%}
.panel.active{display:block}
.svc-header{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.svc-num{background:linear-gradient(135deg,#00c896,#0099ff);color:#000;font-family:'Syne',sans-serif;font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.svc-name{font-weight:700;font-size:.88rem;color:var(--text);line-height:1.3;margin-left:10px;flex:1}
.svc-arrow{color:var(--muted);font-size:1rem;transition:transform .25s;flex-shrink:0}
.svc-dropdown{display:none;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.svc-dropdown.open{display:block}
.svc-opt{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.svc-opt:last-child{border-bottom:none}
.svc-opt.selected{background:rgba(0,200,150,.08);border-left:3px solid var(--ok)}
.svc-opt-num{font-size:.68rem;font-weight:700;color:var(--muted);min-width:22px;flex-shrink:0}
.svc-opt-name{font-size:.86rem;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.sb{font-size:.60rem;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:2px}
.sb-c{background:rgba(0,200,150,.15);color:var(--ok)}
.sb-nc{background:rgba(224,92,58,.15);color:var(--nok)}
.counters{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.chip{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:10px 4px;text-align:center}
.chip .v{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;line-height:1}
.chip .l{font-size:.56rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-top:3px}
.chip.tot .v{background:linear-gradient(135deg,#00c896,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.chip.ok .v{color:var(--ok)}.chip.nok .v{color:var(--nok)}.chip.na2 .v{color:var(--muted)}
.normas{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.norma-b{font-size:.66rem;font-weight:700;background:rgba(0,200,150,.08);color:var(--ok);padding:3px 10px;border-radius:20px;border:1px solid rgba(0,200,150,.2)}
.ftitle{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;line-height:1.3;margin-bottom:5px;background:linear-gradient(135deg,#00c896,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fdesc{font-size:.76rem;color:var(--muted);line-height:1.5;margin-bottom:10px}
.item-card{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.item-card.nc{border-color:var(--nok);background:rgba(224,92,58,.04)}
.item-card.conf{border-color:var(--ok);background:rgba(0,200,150,.03)}
.item-top{padding:14px 14px 10px}
.item-num{font-size:.66rem;font-weight:800;color:var(--muted);margin-bottom:3px}
.item-text{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:8px}
.item-como{font-size:.74rem;color:var(--muted);line-height:1.4;margin-bottom:3px}
.item-tol{font-size:.74rem;color:var(--ok);font-weight:600;line-height:1.4}
.item-frq{font-size:.70rem;color:var(--blue);margin-top:3px}
.item-actions{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--bord);background:rgba(0,0,0,.15)}
.rbtn{display:flex;align-items:center;justify-content:center;width:50px;height:50px;border-radius:50%;border:2px solid var(--bord);background:var(--surf2);cursor:pointer;font-family:'Syne',sans-serif;font-weight:800;font-size:.84rem;color:var(--muted);transition:all .15s;flex-shrink:0;user-select:none}
.rbtn:active{transform:scale(.9)}
.rbtn.ok-btn.sel{background:var(--ok);border-color:var(--ok);color:#000;box-shadow:0 0 14px rgba(0,200,150,.45)}
.rbtn.nok-btn.sel{background:var(--nok);border-color:var(--nok);color:#fff;box-shadow:0 0 14px rgba(224,92,58,.45)}
.rbtn.na-btn.sel{background:var(--na);border-color:var(--na);color:#fff}
.anotar-btn{flex:1;padding:10px 12px;background:var(--surf2);border:1px solid var(--bord);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;text-align:left;transition:all .2s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.anotar-btn.has-text{color:var(--text);border-color:rgba(0,200,150,.3)}
.obs-area{display:none;padding:10px 14px;border-top:1px solid var(--bord)}
.obs-area.open{display:block}
.obs-inp{width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--text);outline:none;resize:none;min-height:60px}
.obs-inp:focus{border-color:var(--ok)}
.fc{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.fc-h{padding:11px 16px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ok)}
.fc-b{padding:14px}
.ff{margin-bottom:12px}
.ff:last-child{margin-bottom:0}
.ff label{display:block;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.ff input,.ff select,.ff textarea{width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:10px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:.92rem;color:var(--text);outline:none;-webkit-appearance:none}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--ok);box-shadow:0 0 0 3px rgba(0,200,150,.1)}
.ff select option{background:var(--surf2)}
.ff textarea{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pa-card{background:var(--card);border:1px solid var(--bord);border-left:3px solid var(--nok);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.pa-h{background:rgba(224,92,58,.1);padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:6px;flex-wrap:wrap}
.pa-num{font-size:.66rem;font-weight:800;color:var(--nok);background:rgba(224,92,58,.15);padding:2px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.pa-nm{font-weight:700;font-size:.86rem;color:var(--text);flex:1;line-height:1.3;margin-left:6px}
.pa-ai{font-size:.62rem;font-weight:700;color:var(--ok);background:rgba(0,200,150,.1);padding:2px 7px;border-radius:8px;border:1px solid rgba(0,200,150,.2);white-space:nowrap}
.pa-b{padding:12px 14px}
.pf{margin-bottom:10px}
.pf:last-child{margin-bottom:0}
.pf label{display:block;font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.pf input,.pf select,.pf textarea{width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:10px;padding:11px 13px;font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--text);outline:none;-webkit-appearance:none}
.pf input:focus,.pf select:focus,.pf textarea:focus{border-color:var(--nok)}
.pf select option{background:var(--surf2)}
.pf textarea{resize:vertical;min-height:60px}
.prow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ai-ld{display:flex;align-items:center;gap:8px;padding:12px 14px;color:var(--muted);font-size:.80rem;border-top:1px solid var(--bord);background:rgba(0,200,150,.03)}
.ai-d span{display:inline-block;width:6px;height:6px;background:var(--ok);border-radius:50%;animation:dot 1.2s infinite;margin:0 2px}
.ai-d span:nth-child(2){animation-delay:.2s}.ai-d span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.empty-pa{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-pa .big{font-size:2.5rem;margin-bottom:10px}
.st-row{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:14px;margin-bottom:12px}
.st-lbl{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block}
.st-pills{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.st-pill{display:block;cursor:pointer}
.st-pill input{display:none}
.st-pi{display:flex;align-items:center;gap:8px;padding:12px 14px;border:1.5px solid var(--bord);border-radius:10px;color:var(--muted);font-size:.84rem;font-weight:600;transition:all .2s;background:var(--surf2)}
.st-pill input:checked + .st-pi{border-color:var(--ok);color:var(--ok);background:rgba(0,200,150,.08)}
.sig-wrap{background:var(--surf2);border:1px solid var(--bord);border-radius:10px;height:80px;position:relative;cursor:crosshair;overflow:hidden;margin-bottom:6px}
canvas.sc{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none}
.sig-lbl{font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ok);display:block;margin-bottom:6px;margin-top:10px}
.clr-b{font-size:.65rem;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;padding:2px 0}
.fab{position:fixed;bottom:72px;right:16px;background:linear-gradient(135deg,#00c896,#0099ff);color:#000;border:none;border-radius:50px;padding:10px 18px;font-family:'Syne',sans-serif;font-weight:800;font-size:.76rem;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,150,.35);display:flex;align-items:center;gap:6px;z-index:50;transition:all .2s}
.fab:active{transform:scale(.95)}
.main *{-webkit-overflow-scrolling:touch}
.panel.active{display:block;overflow-y:visible}
.svc-dropdown{overflow-y:auto;max-height:60vh}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surf2);border:1px solid var(--bord);border-left:3px solid var(--ok);border-radius:12px;padding:10px 18px;font-size:.82rem;font-weight:600;color:var(--text);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-left-color:var(--nok)}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease}
.sp-logo{width:110px;height:110px;border-radius:50%;object-fit:contain;animation:pop .5s ease}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.sp-bar-w{margin-top:28px;width:150px;height:3px;background:#1a2540;border-radius:3px;overflow:hidden}
.sp-bar{height:100%;width:0%;background:linear-gradient(90deg,#00c896,#0099ff);transition:width 1.3s ease}
</style>
</head>

let curFicha=0,dropOpen=false;
const results={},obs={},ncState={},canvases=[];

function goTab(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='ck')renderCK();
  if(name==='pa')renderPA();
  if(name==='ap')renderSigs();
}

function renderCK(){
  const f=FICHAS[curFicha];
  let c=0,nc=0,na=0;
  f.itens.forEach((_,i)=>{const r=results[f.id+'_'+i];if(r==='C')c++;else if(r==='NC')nc++;else if(r==='NA')na++;});
  const pct=Math.round(((c+nc+na)/f.itens.length)*100);
  document.getElementById('progVal').textContent=pct+'%';
  document.getElementById('panel-ck').innerHTML=`
    <div style="margin-bottom:14px">
      <div class="svc-header" id="svcH" onclick="toggleDrop()">
        <span class="svc-num">FVS ${String(curFicha+1).padStart(2,'02')}/16</span>
        <span class="svc-name">${f.nome}</span>
        <span class="svc-arrow" id="svcA" style="transform:${dropOpen?'rotate(180deg)':''}">▼</span>
      </div>
      <div class="svc-dropdown ${dropOpen?'open':''}" id="svcD">
        ${FICHAS.map((ff,i)=>{
          const cv=ff.itens.filter((_,idx)=>results[ff.id+'_'+idx]==='C').length;
          const nv=ff.itens.filter((_,idx)=>results[ff.id+'_'+idx]==='NC').length;
          return `<div class="svc-opt ${i===curFicha?'selected':''}" onclick="selF(${i})">
            <span class="svc-opt-num">${String(i+1).padStart(2,'0')}</span>
            <span class="svc-opt-name">${ff.nome}</span>
            ${cv>0?`<span class="sb sb-c">${cv}C</span>`:''}${nv>0?`<span class="sb sb-nc">${nv}NC</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="ftitle">${f.nome}</div>
    <div class="fdesc">${f.desc}</div>
    <div class="normas">${f.normas.map(n=>`<span class="norma-b">${n}</span>`).join('')}</div>
    <div class="counters">
      <div class="chip tot"><div class="v">${f.itens.length}</div><div class="l">Itens</div></div>
      <div class="chip ok"><div class="v" id="cc">${c}</div><div class="l">Conf.</div></div>
      <div class="chip nok"><div class="v" id="cn">${nc}</div><div class="l">N.Conf.</div></div>
      <div class="chip na2"><div class="v" id="cna">${na}</div><div class="l">N/A</div></div>
    </div>
    ${f.itens.map((it,idx)=>buildCard(f.id,idx,it)).join('')}
  `;
}

function buildCard(fid,idx,it){
  const key=fid+'_'+idx,r=results[key]||'',o=obs[key]||'';
  return `<div class="item-card ${r==='NC'?'nc':r==='C'?'conf':''}" id="ic_${fid}_${idx}">
    <div class="item-top">
      <div class="item-num">${String(idx+1).padStart(2,'0')}.</div>
      <div class="item-text">${it.t}</div>
      <div class="item-como">🔍 ${it.c}</div>
      <div class="item-tol">📐 ${it.tol}</div>
      <div class="item-frq">🔄 ${it.f}</div>
    </div>
    <div class="item-actions">
      <div class="rbtn ok-btn ${r==='C'?'sel':''}" onclick="setR(${fid},${idx},'C')">C</div>
      <div class="rbtn nok-btn ${r==='NC'?'sel':''}" onclick="setR(${fid},${idx},'NC')">NC</div>
      <div class="rbtn na-btn ${r==='NA'?'sel':''}" onclick="setR(${fid},${idx},'NA')">NA</div>
      <button class="anotar-btn ${o?'has-text':''}" onclick="togObs(${fid},${idx})">${o||'Anotar…'}</button>
    </div>
    <div class="obs-area" id="oa_${fid}_${idx}">
      <textarea class="obs-inp" placeholder="Anotação / evidência…" oninput="saveObs(${fid},${idx},this.value)">${o}</textarea>
    </div>
  </div>`;
}

function toggleDrop(){dropOpen=!dropOpen;const d=document.getElementById('svcD'),a=document.getElementById('svcA');if(d)d.classList.toggle('open',dropOpen);if(a)a.style.transform=dropOpen?'rotate(180deg)':'';}
function selF(i){curFicha=i;dropOpen=false;renderCK();autoSave();}

function setR(fid,idx,val){
  const key=fid+'_'+idx;
  results[key]=val;
  const card=document.getElementById(`ic_${fid}_${idx}`);
  if(card){
    card.className='item-card'+(val==='NC'?' nc':val==='C'?' conf':'');
    card.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('sel'));
    const m={C:'ok-btn',NC:'nok-btn',NA:'na-btn'};
    card.querySelector('.'+m[val])?.classList.add('sel');
  }
  if(val==='NC'&&!ncState[key]){
    const f=FICHAS[curFicha];
    ncState[key]={text:f.itens[idx].t,fid,idx,fields:{},loading:true};
    genAI(fid,idx,f.nome,f.itens[idx]);
  } else if(val!=='NC'&&ncState[key]){delete ncState[key];}
  updCnt();updBadge();autoSave();
}

function togObs(fid,idx){const a=document.getElementById(`oa_${fid}_${idx}`);if(a)a.classList.toggle('open');}
function saveObs(fid,idx,v){obs[fid+'_'+idx]=v;const b=document.querySelector(`#ic_${fid}_${idx} .anotar-btn`);if(b){b.textContent=v||'Anotar…';b.classList.toggle('has-text',v.length>0);}autoSave();}

function updCnt(){
  const f=FICHAS[curFicha];let c=0,nc=0,na=0;
  f.itens.forEach((_,i)=>{const r=results[f.id+'_'+i];if(r==='C')c++;else if(r==='NC')nc++;else if(r==='NA')na++;});
  const s=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  s('cc',c);s('cn',nc);s('cna',na);
  const pct=Math.round(((c+nc+na)/f.itens.length)*100);
  document.getElementById('progVal').textContent=pct+'%';
}

function updBadge(){const t=Object.keys(ncState).length,b=document.getElementById('ncBadge');b.textContent=t;b.style.display=t>0?'inline':'';}

async function genAI(fid,idx,nome,it){
  const obra=document.getElementById('f_obra')?.value||'';
  const prompt=`Você é especialista em qualidade de obras de infraestrutura no Brasil. NC identificada: Serviço: "${nome}", Item: "${it.t}", Tolerância: "${it.tol}". Gere plano de ação. Responda SOMENTE com JSON válido sem markdown: {"desc":"2-3 frases","causa":"1-2 frases","acao":"2-3 frases","resp":"cargo adequado","prazo_dias":7,"prio":"Alta","norma":"norma ou vazio"}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const p=JSON.parse(raw);
    const dt=new Date();dt.setDate(dt.getDate()+(p.prazo_dias||7));
    const key=fid+'_'+idx;
    if(ncState[key]){ncState[key].loading=false;ncState[key].fields={desc:p.desc||'',causa:p.causa||'',acao:p.acao||'',resp:p.resp||'',prazo:dt.toISOString().split('T')[0],prio:p.prio||'Média',status:'Aberta',norma:p.norma||''};renderPA();autoSave();}
  }catch(e){const key=fid+'_'+idx;if(ncState[key]){ncState[key].loading=false;ncState[key].fields={status:'Aberta'};renderPA();}}
}

function renderPA(){
  const cont=document.getElementById('paContent');
  const keys=Object.keys(ncState);
  if(keys.length===0){cont.innerHTML=`<div class="empty-pa"><div class="big">🟢</div><p>Nenhuma NC registrada.<br>Marque itens como <strong>NC</strong> no checklist.</p></div>`;return;}
  cont.innerHTML=keys.map((key,i)=>{
    const nc=ncState[key],f=nc.fields||{};
    const [sfid,sidx]=key.split('_');
    const load=nc.loading?`<div class="ai-ld"><div class="ai-d"><span></span><span></span><span></span></div>Gerando sugestões com IA…</div>`:'';
    const body=!nc.loading?`<div class="pa-b">
      <div class="pf"><label>📌 Descrição da NC <span class="pa-ai">✨ IA</span></label><textarea oninput="updNC('${key}','desc',this.value)">${f.desc||''}</textarea></div>
      <div class="pf"><label>🔍 Análise de Causa <span class="pa-ai">✨ IA</span></label><textarea oninput="updNC('${key}','causa',this.value)">${f.causa||''}</textarea></div>
      <div class="pf"><label>🔧 Ação Corretiva <span class="pa-ai">✨ IA</span></label><textarea oninput="updNC('${key}','acao',this.value)">${f.acao||''}</textarea></div>
      ${f.norma?`<div class="pf"><label>📖 Norma</label><input type="text" value="${f.norma}" oninput="updNC('${key}','norma',this.value)"></div>`:''}
      <div class="prow">
        <div class="pf"><label>👷 Responsável <span class="pa-ai">✨ IA</span></label><input type="text" value="${f.resp||''}" oninput="updNC('${key}','resp',this.value)"></div>
        <div class="pf"><label>📅 Prazo <span class="pa-ai">✨ IA</span></label><input type="date" value="${f.prazo||''}" onchange="updNC('${key}','prazo',this.value)"></div>
        <div class="pf"><label>🚨 Prioridade <span class="pa-ai">✨ IA</span></label><select onchange="updNC('${key}','prio',this.value)"><option ${f.prio==='Alta'?'selected':''}>Alta</option><option ${f.prio==='Média'?'selected':''}>Média</option><option ${f.prio==='Baixa'?'selected':''}>Baixa</option></select></div>
        <div class="pf"><label>📊 Status</label><select onchange="updNC('${key}','status',this.value)"><option ${f.status==='Aberta'?'selected':''}>Aberta</option><option ${f.status==='Em andamento'?'selected':''}>Em andamento</option><option ${f.status==='Concluída'?'selected':''}>Concluída</option><option ${f.status==='Verificada'?'selected':''}>Verificada</option></select></div>
      </div>
    </div>`:'';
    return `<div class="pa-card"><div class="pa-h"><span class="pa-num">NC ${String(i+1).padStart(2,'0')}</span><span class="pa-nm">Item ${String(parseInt(sidx)+1).padStart(2,'0')} — ${nc.text}</span>${!nc.loading?'<span class="pa-ai">✨ IA</span>':''}</div>${load}${body}</div>`;
  }).join('');
}
function updNC(key,k,v){if(ncState[key]){ncState[key].fields[k]=v;autoSave();}}

function renderSigs(){
  const a=document.getElementById('sigArea');
  if(canvases.length>0)return;
  const sigs=[['Responsável Técnico','CREA/CAU'],['Fiscal/Inspetor','Matrícula'],['Cliente/Contratante','CPF/CNPJ']];
  a.innerHTML=sigs.map((s,i)=>`<div style="margin-bottom:16px">
    <span class="sig-lbl">${s[0]}</span>
    <div class="sig-wrap"><canvas class="sc" id="sc${i}"></canvas></div>
    <button class="clr-b" onclick="clrSig(${i})">✕ limpar</button>
    <div class="frow" style="margin-top:8px">
      <div class="ff"><input type="text" id="sn${i}" placeholder="Nome completo" oninput="autoSave()"></div>
      <div class="ff"><input type="text" id="sr${i}" placeholder="${s[1]}" oninput="autoSave()"></div>
    </div>
    <div class="ff"><input type="date" id="sd${i}" onchange="autoSave()"></div>
  </div>`).join('');
  [0,1,2].forEach(i=>{
    const cv=document.getElementById('sc'+i),ctx=cv.getContext('2d');
    let dr=false,last=null;
    function rsz(){const r=cv.parentElement.getBoundingClientRect(),d=window.devicePixelRatio||1;cv.width=r.width*d;cv.height=r.height*d;ctx.scale(d,d);ctx.strokeStyle='#e8eaf2';ctx.lineWidth=2;ctx.lineCap='round';}
    rsz();canvases[i]={canvas:cv,ctx,clear:()=>ctx.clearRect(0,0,cv.width,cv.height)};
    function gp(e){const r=cv.getBoundingClientRect();return e.touches?{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}:{x:e.clientX-r.left,y:e.clientY-r.top};}
    cv.addEventListener('mousedown',e=>{dr=true;last=gp(e);});
    cv.addEventListener('mousemove',e=>{if(!dr)return;const p=gp(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;});
    cv.addEventListener('mouseup',()=>{dr=false;autoSave();});
    cv.addEventListener('mouseleave',()=>dr=false);
    cv.addEventListener('touchstart',e=>{e.preventDefault();dr=true;last=gp(e);},{passive:false});
    cv.addEventListener('touchmove',e=>{if(!dr)return;e.preventDefault();const p=gp(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;},{passive:false});
    cv.addEventListener('touchend',()=>{dr=false;autoSave();});
  });
}
function clrSig(i){if(canvases[i]){canvases[i].clear();autoSave();}}

let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('massei_fvs_v3',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('d',{keyPath:'id'});r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=()=>rej();});}

function collectData(){
  const d={};
  ['obra','cont','resp','fisc','data','num','hi','ht','loc','obs'].forEach(k=>{const el=document.getElementById('f_'+k);if(el)d[k]=el.value||'';});
  d.results=Object.assign({},results);d.obs=Object.assign({},obs);
  d.nc={};Object.entries(ncState).forEach(([k,v])=>{d.nc[k]={text:v.text,fid:v.fid,idx:v.idx,fields:v.fields||{}};});
  d.curFicha=curFicha;
  const stEl=document.querySelector('input[name="st"]:checked');d.status=stEl?stEl.value:'';
  [0,1,2].forEach(i=>{['sn','sr','sd'].forEach(k=>{const el=document.getElementById(k+i);d[k+i]=el?el.value:'';});d['sig'+i]=canvases[i]?canvases[i].canvas.toDataURL():'';});
  return d;
}
async function saveFVS(){
  const data=collectData();await openDB();
  const tx=db.transaction('d','readwrite');tx.objectStore('d').put({id:'main',data,ts:Date.now()});
  tx.oncomplete=()=>showToast('💾 Salvo!');tx.onerror=()=>showToast('❌ Erro',true);
}
function applyData(d){
  ['obra','cont','resp','fisc','data','num','hi','ht','loc','obs'].forEach(k=>{const el=document.getElementById('f_'+k);if(el&&d[k]!==undefined)el.value=d[k]||'';});
  if(d.results)Object.assign(results,d.results);
  if(d.obs)Object.assign(obs,d.obs);
  if(d.nc)Object.entries(d.nc).forEach(([k,v])=>{ncState[k]={text:v.text,fid:v.fid,idx:v.idx,fields:v.fields||{},loading:false};});
  if(d.curFicha!==undefined)curFicha=d.curFicha;
  if(d.status){const el=document.querySelector(`input[name="st"][value="${d.status}"]`);if(el)el.checked=true;}
  updBadge();renderCK();
}
let asTmr;function autoSave(){clearTimeout(asTmr);asTmr=setTimeout(saveFVS,1800);}
function showToast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2800);}

setTimeout(()=>{document.getElementById('spBar').style.width='100%';},100);
setTimeout(()=>{const s=document.getElementById('splash');s.style.opacity='0';setTimeout(()=>s.remove(),600);},1600);
document.getElementById('f_data').value=new Date().toISOString().split('T')[0];
renderCK();updBadge();
openDB().then(()=>{const tx=db.transaction('d','readonly');const r=tx.objectStore('d').get('main');r.onsuccess=e=>{if(e.target.result)applyData(e.target.result.data);};});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
